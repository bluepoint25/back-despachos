name: CI/CD - Back Ventas

on:
  push:
    branches: [ "deploy" ]

jobs:
  build-push-deploy-ventas:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build y Push imagen a ECR
        run: |
          docker build -t back-ventas Springboot-API-REST
          docker tag back-ventas:latest ${{ secrets.ECR_REPO_URL_VENTAS }}:latest
          docker push ${{ secrets.ECR_REPO_URL_VENTAS }}:latest

      - name: Desplegar en EC2 Backend vía SSM
        run: |
          COMMANDS='["set -e","aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}","docker pull ${{ secrets.ECR_REPO_URL_VENTAS }}:latest","docker stop back-ventas || true","docker rm back-ventas || true","docker run -d --name back-ventas -p 8082:8082 -e SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }} -e SPRING_DATASOURCE_USERNAME=${{ secrets.MYSQL_USER }} -e SPRING_DATASOURCE_PASSWORD=${{ secrets.MYSQL_PASSWORD }} ${{ secrets.ECR_REPO_URL_VENTAS }}:latest"]'
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy back-ventas" \
            --parameters commands="$COMMANDS" \
            --output text